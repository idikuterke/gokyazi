<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GÖK YAZI — Buttons & Controls</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-cosmos); color: var(--fg-primary); font-family: var(--font-body); padding: 48px 40px; }
  h1 { font-family: var(--font-display); font-size: 11px; letter-spacing: 3px; color: var(--fg-tertiary); text-transform: uppercase; margin-bottom: 48px; }
  .section { margin-bottom: 48px; border-bottom: 1px solid var(--border-hairline); padding-bottom: 32px; }
  .section:last-child { border-bottom: none; }
  .section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--fg-tertiary); margin-bottom: 20px; }
  .row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; margin-bottom: 16px; }

  /* Primary amber CTA */
  .btn-primary {
    display: inline-flex; align-items: center; justify-content: center;
    height: 56px; padding: 0 40px;
    background: linear-gradient(135deg, #FFA000 0%, #D4A017 100%);
    color: #000;
    font-family: var(--font-display); font-weight: 700; font-size: 15px;
    letter-spacing: 0.05em;
    border: none; border-radius: 12px;
    box-shadow: 0 4px 16px rgba(255,160,0,0.4);
    cursor: pointer;
    transition: all 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .btn-primary:hover { transform: scale(1.02); filter: brightness(1.1); box-shadow: 0 6px 24px rgba(255,160,0,0.6); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary.disabled { opacity: 0.6; pointer-events: none; }

  /* Secondary — ghost amber */
  .btn-secondary {
    display: inline-flex; align-items: center; justify-content: center;
    height: 48px; padding: 0 28px;
    background: transparent;
    color: var(--amber-300);
    font-family: var(--font-display); font-weight: 700; font-size: 14px;
    letter-spacing: 0.05em;
    border: 1.5px solid var(--border-amber);
    border-radius: 12px;
    cursor: pointer;
    transition: all 200ms ease;
  }
  .btn-secondary:hover { background: rgba(255,160,0,0.08); }

  /* Pill button (Onboarding CTA) */
  .btn-pill {
    display: inline-flex; align-items: center; gap: 8px;
    height: 56px; padding: 0 32px;
    background: linear-gradient(135deg, #FFA000 0%, #D4A017 100%);
    color: #000;
    font-family: var(--font-display); font-weight: 700; font-size: 18px;
    border: none; border-radius: 12px;
    cursor: pointer;
    animation: gk-pulse-glow 2s ease-in-out infinite;
  }

  /* Text CTA (devam et) */
  .btn-text-cta {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--amber-300); font-size: 16px; font-weight: 600;
    background: none; border: none; cursor: pointer;
    transition: gap 300ms;
  }
  .btn-text-cta:hover { gap: 12px; }
  .btn-text-cta .arrow { transition: transform 300ms; }
  .btn-text-cta:hover .arrow { transform: translateX(4px); }

  /* Skip button */
  .btn-skip {
    color: #9CA3AF; font-size: 14px; font-weight: 500;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid rgba(156,163,175,0.3); border-radius: 20px;
    cursor: pointer; transition: all 200ms;
  }
  .btn-skip:hover { color: var(--amber-300); border-color: rgba(252,211,77,0.5); background: rgba(252,211,77,0.1); }

  /* Icon circle button (settings) */
  .btn-circle {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,215,0,0.15);
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--fg-primary); font-size: 18px;
    backdrop-filter: blur(10px);
    transition: background 200ms;
  }
  .btn-circle:hover { background: rgba(255,215,0,0.1); }

  /* Profile pill (AppBar) */
  .btn-profile {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,215,0,0.15);
    border-radius: 22px;
    cursor: pointer;
    backdrop-filter: blur(10px);
  }
  .btn-profile .avatar {
    width: 22px; height: 22px; border-radius: 50%;
    background: linear-gradient(135deg, #FFD700, #C99411);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: #0C0A18;
  }
  .btn-profile .label {
    font-family: var(--font-display); font-weight: 700; font-size: 12px;
    letter-spacing: 0.96px; color: var(--fg-primary);
  }

  /* Daily ritual primary (on last onboarding) */
  .btn-start {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    height: 56px; padding: 0 32px;
    background: linear-gradient(135deg, #FFA000 0%, #D4A017 100%);
    color: #000; font-family: var(--font-display); font-weight: 700; font-size: 18px;
    border: none; border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,160,0,0.5);
  }
</style>
</head>
<body>
<h1>GÖK YAZI — Buttons & Controls</h1>

<div class="section">
  <div class="section-label">Primary CTA — Amber Gradient</div>
  <div class="row">
    <button class="btn-primary">Zarları At</button>
    <button class="btn-primary">Giriş Yap</button>
    <button class="btn-primary">Devam Et</button>
  </div>
  <div class="row">
    <button class="btn-primary disabled">Devre Dışı</button>
  </div>
</div>

<div class="section">
  <div class="section-label">Secondary — Ghost Amber</div>
  <div class="row">
    <button class="btn-secondary">Yeni Soru</button>
    <button class="btn-secondary">Günlüğüme Kaydet</button>
  </div>
</div>

<div class="section">
  <div class="section-label">Onboarding CTA — Pulsing</div>
  <div class="row">
    <button class="btn-pill">Başla ✦</button>
    <button class="btn-start">Kaderin Sesini Dinle →</button>
  </div>
</div>

<div class="section">
  <div class="section-label">Text CTA — Animated Arrow</div>
  <div class="row">
    <button class="btn-text-cta">Devam Et <span class="arrow">→</span></button>
  </div>
</div>

<div class="section">
  <div class="section-label">Skip Button</div>
  <div class="row">
    <button class="btn-skip">Geç</button>
  </div>
</div>

<div class="section">
  <div class="section-label">AppBar Chrome</div>
  <div class="row">
    <div class="btn-profile">
      <div class="avatar">İ</div>
      <span class="label">PROFİL</span>
    </div>
    <button class="btn-circle">⚙</button>
  </div>
</div>

<div class="section">
  <div class="section-label">Dot Indicator</div>
  <div class="row">
    <div style="display:flex;gap:8px;align-items:center;">
      <div class="gk-dot active"></div>
      <div class="gk-dot"></div>
      <div class="gk-dot"></div>
      <div class="gk-dot"></div>
    </div>
  </div>
</div>

</body>
</html>
