<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:18px;background:#0C0A18;font-family:var(--font-body);color:#fff;display:flex;gap:18px;align-items:center}
.hero{flex:0 0 auto;text-align:center}
.hero img{width:150px;height:150px;object-fit:contain;display:block;filter:drop-shadow(0 0 24px rgba(255,193,7,.35))}
.hero .cap{font-size:11px;color:rgba(255,255,255,.65);margin-top:6px;font-family:ui-monospace,monospace}
.rule{width:1px;align-self:stretch;background:rgba(255,255,255,.12)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 14px;flex:1}
.ico{text-align:center}
.ico img{width:60px;height:60px;object-fit:contain}
.label{font-size:10px;color:rgba(255,255,255,.6);margin-top:4px;font-family:ui-monospace,monospace}
</style></head><body>
<div class="hero">
  <img src="../assets/ikon.png">
  <div class="cap">ikon.png · app mark</div>
</div>
<div class="rule"></div>
<div class="grid">
  <div class="ico"><img src="../assets/ikon_irk_bitig.png"><div class="label">irk_bitig</div></div>
  <div class="ico"><img src="../assets/ikon_tarot.png"><div class="label">tarot</div></div>
  <div class="ico"><img src="../assets/ikon_takvim.png"><div class="label">takvim</div></div>
  <div class="ico"><img src="../assets/ikon_mitoloji.png"><div class="label">mitoloji</div></div>
  <div class="ico"><img src="../assets/ikon_profil.png"><div class="label">profil</div></div>
  <div class="ico"><img src="../assets/ikon_ayarlar.png"><div class="label">ayarlar</div></div>
</div>
</body></html>
