<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#0C0A18;font-family:var(--font-body);display:flex;flex-direction:column;gap:14px;max-width:620px}
input{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5);border-radius:8px;padding:14px 16px;font-size:16px;font-family:var(--font-body);outline:none}
input::placeholder{color:rgba(255,255,255,.45)}
.focus{border-color:#FFC107}
.cap{font-size:11px;color:rgba(255,255,255,.55);font-family:ui-monospace,monospace}
</style></head><body>
<div>
<input placeholder="Niyetini veya sorunu buraya yaz…">
<div class="cap" style="margin-top:6px">resting · 50% white border</div>
</div>
<div>
<input class="focus" value="Yarın nasıl geçecek?">
<div class="cap" style="margin-top:6px">focused · amber border</div>
</div>
</body></html>
