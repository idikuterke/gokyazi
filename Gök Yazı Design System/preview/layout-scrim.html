<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:0;background:#0C0A18;color:#fff;font-family:var(--font-body)}
.wrap{position:relative;height:300px}
.wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.scrim{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.content{position:relative;padding:30px;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;box-sizing:border-box;text-align:center}
.title{font-family:var(--font-display);font-size:22px;letter-spacing:.09em;text-shadow:0 0 10px rgba(0,0,0,.9)}
.sub{margin-top:10px;font-size:14px;color:rgba(255,255,255,.8);text-shadow:0 0 8px rgba(0,0,0,.9);max-width:360px}
.cap{position:absolute;left:10px;bottom:10px;font-size:10px;color:rgba(255,255,255,.8);font-family:ui-monospace,monospace;background:rgba(0,0,0,.6);padding:3px 7px;border-radius:4px}
</style></head><body>
<div class="wrap">
  <img src="../assets/tengri.jpeg">
  <div class="scrim"></div>
  <div class="content">
    <div class="title">Göklere Uzanan Yolculuk</div>
    <div class="sub">Kadim Türklerin inanç ve mitoloji dolu dünyasına adım at.</div>
  </div>
  <div class="cap">bg + 50% scrim + centered display + text-shadow — the canonical stack</div>
</div>
</body></html>
