<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:#0C0A18;display:flex;flex-direction:column;gap:10px;font-family:var(--font-body);color:#fff}
.row{display:flex;align-items:center;gap:14px}
.chip{width:140px;padding:6px 10px;border-radius:6px;font-size:13px;border:1px solid rgba(255,255,255,.14)}
.v{font-family:ui-monospace,monospace;font-size:11px;opacity:.7}
</style></head><body>
<div class="row"><div class="chip" style="color:#fff">Primary white</div><div class="v">#FFFFFF · 100%</div></div>
<div class="row"><div class="chip" style="color:rgba(255,255,255,.7)">Secondary</div><div class="v">white · 70%</div></div>
<div class="row"><div class="chip" style="color:rgba(255,255,255,.5)">Tertiary / input</div><div class="v">white · 50%</div></div>
<div class="row"><div class="chip" style="color:rgba(255,255,255,.3)">Disabled</div><div class="v">white · 30%</div></div>
<div class="row"><div class="chip" style="color:rgba(255,255,255,.24)">Divider line</div><div class="v">white · 24%</div></div>
</body></html>
