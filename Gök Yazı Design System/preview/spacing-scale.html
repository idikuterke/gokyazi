<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:#0C0A18;font-family:var(--font-body);color:#fff;display:flex;gap:20px;flex-wrap:wrap}
.box{width:120px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:12px;text-align:center;font-size:12px}
.pad{background:rgba(255,193,7,.12);border:1px dashed rgba(255,193,7,.4);border-radius:6px;margin-bottom:8px}
.l{color:rgba(255,255,255,.7);font-size:10px;margin-top:4px;font-family:ui-monospace,monospace}
</style></head><body>
<div class="box"><div class="pad" style="height:4px"></div>4px<div class="l">--space-1</div></div>
<div class="box"><div class="pad" style="height:8px"></div>8px<div class="l">--space-2</div></div>
<div class="box"><div class="pad" style="height:12px"></div>12px<div class="l">--space-3</div></div>
<div class="box"><div class="pad" style="height:16px"></div>16px<div class="l">--space-4</div></div>
<div class="box"><div class="pad" style="height:20px"></div>20px<div class="l">--space-5</div></div>
<div class="box"><div class="pad" style="height:24px"></div>24px<div class="l">--space-6</div></div>
<div class="box"><div class="pad" style="height:40px"></div>40px<div class="l">--space-8</div></div>
</body></html>
