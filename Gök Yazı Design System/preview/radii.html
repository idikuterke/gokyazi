<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:#0C0A18;font-family:var(--font-body);color:#fff;display:flex;gap:18px;flex-wrap:wrap}
.box{background:rgba(20,18,38,.8);border:1px solid rgba(255,255,255,.2);padding:16px 22px;color:#fff;font-size:13px;text-align:center;min-width:110px}
.l{color:rgba(255,255,255,.65);font-size:10px;margin-top:6px;font-family:ui-monospace,monospace}
</style></head><body>
<div class="box" style="border-radius:8px">Thumb<div class="l">8px · images</div></div>
<div class="box" style="border-radius:12px">Card<div class="l">12px · dialogs</div></div>
<div class="box" style="border-radius:15px">Tile<div class="l">15px · home</div></div>
<div class="box" style="border-radius:25px">Pill<div class="l">25px · buttons</div></div>
<div class="box" style="border-radius:9999px;width:80px;height:80px;padding:0;display:flex;align-items:center;justify-content:center">Round<div class="l"></div></div>
</body></html>
