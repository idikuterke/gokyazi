<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:16px;background:#0C0A18;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;font-family:var(--font-body)}
.sw{border-radius:10px;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;height:110px;border:1px solid var(--border-hairline)}
.k{font-size:11px;color:#000;font-weight:600}
.v{font-size:10px;color:rgba(0,0,0,.7);font-family:ui-monospace,monospace;margin-top:2px}
.dark .k,.dark .v{color:#fff}.dark .v{opacity:.7}
</style></head><body>
<div class="sw" style="background:#FFA000"><div class="k">Amber 700</div><div class="v">#FFA000 · btn</div></div>
<div class="sw" style="background:#FFC107"><div class="k">Amber 500</div><div class="v">#FFC107 · headline</div></div>
<div class="sw" style="background:#FFE082"><div class="k">Amber 200</div><div class="v">#FFE082 · label</div></div>
<div class="sw dark" style="background:#4DD0E1"><div class="k" style="color:#001">Cyan AI</div><div class="v" style="color:rgba(0,0,0,.7)">#4DD0E1</div></div>
</body></html>
